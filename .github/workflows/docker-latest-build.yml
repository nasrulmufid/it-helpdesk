name: Build and Push Latest Multi-Service Docker Image

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Downcase Repo Name
      run: |
        echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/it-help-desk-multi" >> ${GITHUB_ENV}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=raw,value=main

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.multi
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Create GitHub Release for Latest
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: latest
        release_name: Latest Multi-Service Docker Image
        body: |
          ## Latest Multi-Service Docker Image
          
          This is the latest build from the main branch with all current features.
          
          ### Multi-Service Features
          - Laravel 11 application
          - MySQL 8.0 database
          - phpMyAdmin for database management
          - All services running in a single container
          
          ### Quick Start
          ```bash
          # Pull the latest image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
          # Run the container
          docker run -d -p 80:80 --name it-help-desk-multi \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ```
          
          ### Access Points
          - Application: http://localhost
          - phpMyAdmin: http://localhost/phpmyadmin
          
          ### Default Credentials
          - phpMyAdmin: Use MySQL credentials
          - MySQL Root: root_password
          - Application Database: it_helpdesk_user / it_helpdesk_pass
          
          ### Documentation
          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed configuration options.
        draft: false
        prerelease: false